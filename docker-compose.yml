version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: server
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/moderation
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - uploads_data:/app/uploads        

  client:
    build: ./client
    container_name: client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongo_data:
  uploads_data:                          
